<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Ajudante do desenvolvedor Nathanael Jorge — Agente de IA especialista em Dragon Ball Super. Consulte informações de 44 personagens.">
    <title>🐉 Ajudante do desenvolvedor Nathanael Jorge — Dragon Ball Super</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="chat-header">
            <div class="header-avatar">
                <span class="avatar-icon">🐉</span>
                <div class="status-dot"></div>
            </div>
            <div class="header-info">
                <h1>Ajudante do desenvolvedor Nathanael Jorge</h1>
                <p class="header-subtitle">Agente IA • Dragon Ball Super</p>
            </div>
            <button class="btn-reset" id="btn-reset" title="Nova conversa">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M1 4v6h6M23 20v-6h-6"/>
                    <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
                </svg>
            </button>
        </header>

        <!-- Chat Area -->
        <main class="chat-messages" id="chat-messages">
            <!-- Messages rendered by JS -->
        </main>

        <!-- Typing Indicator -->
        <div class="typing-indicator" id="typing-indicator">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <span class="typing-text">Pensando...</span>
        </div>

        <!-- Input Area -->
        <footer class="chat-input-area">
            <form id="chat-form" class="input-wrapper">
                <input
                    type="text"
                    id="message-input"
                    class="chat-input"
                    placeholder="Digite o ID do personagem (1-44)..."
                    autocomplete="off"
                    autofocus
                >
                <button type="submit" class="btn-send" id="btn-send" title="Enviar">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="22" y1="2" x2="11" y2="13"/>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                    </svg>
                </button>
            </form>
            <p class="input-footer">
                Powered by <strong>OpenAI</strong> • Projeto acadêmico — mat. 2024206510025
            </p>
        </footer>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <script src="/static/app.js"></script>
</body>
</html>
